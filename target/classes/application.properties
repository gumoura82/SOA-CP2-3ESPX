# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:meetingroomdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT
jwt.secret=Z2VyZW5jaWFtZW50b0RlU2FsYXNEZVJldW5pYW9TZWNyZXRLZXkyMDI0QVBJSmF2YVNwcmluZ0Jvb3Q=
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true

# Logging
logging.level.com.meetingroom=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache
spring.cache.type=simple

# Garante que data.sql rode com Spring Boot 3 + JPA
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
